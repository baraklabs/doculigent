appId: com.doculigent.app
productName: Doculigent
directories:
  output: dist
  buildResources: resources
# Registers the doculigent:// custom URI scheme with the OS (Windows registry entries via
# NSIS, macOS CFBundleURLTypes, Linux .desktop MimeType) — see
# electron/main/auth/deepLink.ts for the handlers this feeds.
protocols:
  - name: Doculigent
    schemes:
      - doculigent
files:
  - out/**/*
  - package.json
asarUnpack:
  - "**/*.node"
  - node_modules/ffmpeg-static/**
win:
  target:
    - nsis
mac:
  target:
    - dmg
  category: public.app-category.video
linux:
  target:
    - deb
    - AppImage
  category: AudioVideo
