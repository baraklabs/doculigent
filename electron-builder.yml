appId: com.doculigent.app
productName: Doculigent
directories:
  output: dist
  buildResources: resources
publish:
  provider: github
  owner: baraklabs
  repo: doculigent
protocols:
  - name: Doculigent
    schemes:
      - doculigent
files:
  - out/**/*
  - package.json
asarUnpack:
  - "**/*.node"
  - node_modules/ffmpeg-static/**
win:
  target:
    - nsis
mac:
  target:
    - dmg
  category: public.app-category.video
linux:
  target:
    - deb
    - AppImage
  category: AudioVideo
