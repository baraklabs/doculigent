name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck
      - name: Write production env
        shell: bash
        run: |
          mkdir -p env
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" > env/.env.production
          echo "VITE_WEB_URL=${{ secrets.VITE_WEB_URL }}" >> env/.env.production

      - name: Build and publish
        run: npm run build -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
